<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-container"></div>
    
    <div id="loginSection" class="glass-container active">
        <div class="header">
            <img src="admin_logo.png" alt="DIU CPC Logo" class="logo">
            <h1>Admin Access</h1>
            <p>Secure login required</p>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Username" required autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Password" required autocomplete="current-password">
            </div>
            <button type="submit" id="loginBtn">
                <span id="loginBtnText">Login</span>
                <div class="spinner" id="loginSpinner" style="display: none;"></div>
            </button>
            <div class="error-message" id="loginErrorMsg"></div>
        </form>
    </div>

    <!-- Dashboard layout -->
    <div id="dashboardSection" class="dashboard-container" style="display: none;">
        <nav class="sidebar glass-panel">
            <div class="brand">
                <img src="admin_logo.png" alt="DIU CPC Logo" class="logo-small">
                <h2>Admin</h2>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="#" id="navMembers">Members Data</a></li>
                <li><a href="#" id="navRecycle">Recycle Bin</a></li>
                <li><a href="#" id="logoutBtn" class="logout">Logout</a></li>
            </ul>
        </nav>
        
        <main class="main-content">
            <header class="glass-panel d-flex">
                <h2 id="mainHeading">Member Directory</h2>
                <button id="addMemberBtn" class="btn-primary">+ Add New Member</button>
            </header>
            
            <div class="table-container glass-panel">
                <table id="membersTable">
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Name</th>
                            <th>ID</th>
                            <th>Batch</th>
                            <th>Department</th>
                            <th>Options</th>
                        </tr>
                    </thead>
                    <tbody id="membersBody">
                        <!-- Data populated dynamically -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Edit/Add Modal -->
    <div id="editModal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-panel">
            <h3 id="modalTitle">Edit Member</h3>
            <form id="editForm">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Email (Unique Key)</label>
                        <input type="email" id="editEmail" required>
                    </div>
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="input-group">
                        <label>Member ID</label>
                        <input type="text" id="editMemberId">
                    </div>
                    <div class="input-group">
                        <label>Batch</label>
                        <input type="text" id="editBatch">
                    </div>
                    <div class="input-group">
                        <label>Registration</label>
                        <input type="text" id="editRegistration">
                    </div>
                    <div class="input-group">
                        <label>Roll No.</label>
                        <input type="text" id="editRollNo">
                    </div>
                    <div class="input-group">
                        <label>Department</label>
                        <input type="text" id="editDept">
                    </div>
                    <div class="input-group">
                        <label>Mobile No.</label>
                        <input type="text" id="editMobile">
                    </div>
                    <div class="input-group">
                        <label>Joining Year</label>
                        <input type="text" id="editJoined">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancelEditBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" id="saveEditBtn" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
